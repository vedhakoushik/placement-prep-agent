# ═══════════════════════════════════════════════════════════════════════
#  docker-compose.yml — Two-container production setup  (Day 43-44)
#
#  Services:
#    chromadb  — vector database  (official image, named volume)
#    app       — Streamlit UI     (built from our Dockerfile)
#
#  Three concepts demonstrated here:
#
#  1. VOLUMES
#     chroma_data is a named Docker volume. Data written by the chromadb
#     container survives `docker compose down` and reappears on `up`.
#     Without it, every restart wipes the vector database.
#
#  2. ENVIRONMENT
#     API keys come from .env via `env_file` — never hardcoded here.
#     Docker-specific config (CHROMA_HOST, IS_PERSISTENT) goes under
#     `environment` so it's always set regardless of the .env file.
#
#  3. DEPENDS_ON
#     The app service uses `depends_on: condition: service_healthy`.
#     Docker will wait until ChromaDB's healthcheck returns 200 before
#     starting Streamlit. Without this, the app crashes on startup
#     because ChromaDB isn't listening yet.
#
#  Internal networking:
#     Both services join `placement-net`. Docker registers each service
#     name as a hostname on that network, so the app reaches ChromaDB
#     at http://chromadb:8000 — no IP addresses, no exposed ports needed
#     between the two containers.
#
#  Commands:
#    docker compose up           # start both containers (build if needed)
#    docker compose up --build   # force rebuild of app image
#    docker compose down         # stop + remove containers (data survives)
#    docker compose down -v      # stop + remove containers + wipe volumes
#    docker compose logs -f      # tail logs from all services
#    docker compose logs app     # logs from one service only
#    docker compose ps           # see status of each service
# ═══════════════════════════════════════════════════════════════════════

services:

  # ── Container 1: ChromaDB ────────────────────────────────────────────
  #
  #  The official chromadb/chroma image runs a FastAPI server on port 8000.
  #  No Dockerfile needed — we use it as-is.
  #
  #  VOLUMES explained:
  #    chromadb/chroma:latest (0.5+) stores its SQLite + HNSW files at /data
  #    (confirmed in startup logs: "Saving data to: /data").
  #    We mount the named volume chroma_data to that exact path so writes
  #    land in persistent storage and survive docker compose down.
  #    Named volumes live in Docker's storage area (not your project folder)
  #    and survive `docker compose down`. Only `docker compose down -v`
  #    removes them. This is how databases persist across restarts.
  #
  #  ENVIRONMENT explained:
  #    ANONYMIZED_TELEMETRY=FALSE → opt out of ChromaDB's usage statistics
  #    IS_PERSISTENT is NOT set — persistence is the default in chromadb 0.5+.
  #    Setting unknown/deprecated env vars in older style can crash the server.
  #
  chromadb:
    image: chromadb/chroma:latest
    container_name: placement-prep-chromadb

    ports:
      - "8000:8000"             # expose to host so local week3/ scripts can connect too

    volumes:
      - chroma_data:/data            # ← CONCEPT 1: /data is where chromadb 0.5+ writes

    environment:                     # ← CONCEPT 2: non-secret config (not in .env)
      - ANONYMIZED_TELEMETRY=FALSE   # persistence is default; IS_PERSISTENT removed

    networks:
      - placement-net                # ← internal network (app reaches this as "chromadb")

    healthcheck:                     # required for depends_on condition: service_healthy
      # Use a TCP socket check — works regardless of chromadb API version.
      # socket.create_connection raises if port 8000 is not yet accepting connections.
      # Python is always available in the chromadb/chroma image; curl is not.
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),5); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

    restart: unless-stopped


  # ── Container 2: Streamlit app ───────────────────────────────────────
  #
  #  Built from our Dockerfile (multi-stage: builder + runtime stages).
  #
  #  ENV_FILE explained:
  #    `env_file: .env` reads every KEY=VALUE from .env and injects them
  #    as environment variables inside the container. The file itself is
  #    never copied into the image. This is the standard way to pass API
  #    keys: they stay on your host, out of version control, out of the image.
  #
  #  ENVIRONMENT (additional overrides):
  #    CHROMA_HOST=chromadb tells src/chroma_client.py to use HttpClient
  #    instead of PersistentClient. Docker resolves "chromadb" to the
  #    chromadb container's IP on placement-net automatically.
  #
  #  DEPENDS_ON explained:
  #    condition: service_healthy means Docker checks chromadb's healthcheck
  #    before starting this container. Without it, Streamlit starts while
  #    ChromaDB is still booting and gets a connection refused error.
  #    The healthcheck tries a TCP connection to port 8000 every 10s —
  #    once it succeeds, Docker considers the service healthy and starts the app.
  #
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: placement-prep:local
    container_name: placement-prep-app

    ports:
      - "8501:8501"

    env_file:                        # ← CONCEPT 2: secrets from .env, never hardcoded
      - .env

    environment:                     # ← CONCEPT 2: Docker-specific config on top of .env
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - CHROMA_HOST=chromadb         # "chromadb" resolves to the container on placement-net
      - CHROMA_PORT=8000

    depends_on:                      # ← CONCEPT 3: wait for ChromaDB to be ready
      chromadb:
        condition: service_healthy   # not just "started" — actually passing health check

    networks:
      - placement-net                # same network as chromadb → can reach it by name

    volumes:
      - .:/app                       # mount source for live reload during development
      - /app/__pycache__             # but exclude pycache from the mount

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped


# ── Named volumes ────────────────────────────────────────────────────
#
#  CONCEPT 1 — Volumes in detail:
#
#  Named volumes (chroma_data) vs bind mounts (./:/app):
#
#    Named volume   → Docker manages the location on disk
#                     Persists across `docker compose down`
#                     Removed only by `docker compose down -v`
#                     Best for database storage (ChromaDB, Postgres, etc.)
#
#    Bind mount     → You control the path (e.g. ./:/app)
#                     Useful for development: edit code → see changes live
#                     Don't use for databases — deleting the folder = data loss
#
#  chroma_data is mounted at /data inside the container (chromadb 0.5+ default).
#  On the host it lives at:
#    Linux/Mac:  /var/lib/docker/volumes/<project>_chroma_data/_data
#    Windows:    inside the Docker Desktop WSL2 virtual disk
#
volumes:
  chroma_data:
    driver: local                    # default driver, stored in Docker's volume area


# ── Internal network ─────────────────────────────────────────────────
#
#  placement-net is a private bridge network only these two containers
#  can see. Traffic between app and chromadb never leaves the Docker host.
#
#  Without a named network, Compose creates a default one automatically.
#  Naming it explicitly makes the intent clear and lets you inspect it:
#    docker network inspect placement-prep-agent_placement-net
#
networks:
  placement-net:
    driver: bridge
