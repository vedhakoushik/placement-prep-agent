# ═══════════════════════════════════════════════════════════════════════
#  docker-compose.yml — Single container, all-in-one
#
#  ONE service: the Streamlit app.
#  It handles everything:
#    - Frontend  (Streamlit UI rendered in the browser)
#    - Backend   (Python logic: search, AI, chat history)
#    - API calls (Gemini + Tavily called directly from Python)
#    - Chatbot   (the Chat page)
#
#  No separate backend server. No separate API server.
#  One port (8501), one process, one container.
#
#  This is the same architecture Railway runs in production.
#
#  Commands:
#    docker compose up           # build + start
#    docker compose up --build   # force rebuild
#    docker compose down         # stop
#    docker compose logs -f      # tail logs
# ═══════════════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: placement-prep:local
    container_name: placement-prep-app

    ports:
      - "8501:8501"           # the only port — UI + backend + API all here

    env_file:
      - .env                  # GEMINI_API_KEY, TAVILY_API_KEY

    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true

    volumes:
      - .:/app                # bind mount for live reload during development
      - /app/__pycache__

    restart: unless-stopped
