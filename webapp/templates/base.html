<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Placement Prep Agent{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="brand-icon"><i class="fa-solid fa-brain"></i></div>
      <span class="brand-text">PlacementPrep<span class="text-accent">AI</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="fa-solid fa-house me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/chat' %}active{% endif %}" href="/chat">
            <i class="fa-solid fa-message me-1"></i>Chat
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/interview' %}active{% endif %}" href="/interview">
            <i class="fa-solid fa-microphone me-1"></i>Interview Coach
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/research' %}active{% endif %}" href="/research">
            <i class="fa-solid fa-magnifying-glass me-1"></i>Research
          </a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="btn btn-accent btn-sm" href="https://github.com/vedhakoushik/placement-prep-agent" target="_blank">
            <i class="fa-brands fa-github me-1"></i>GitHub
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="footer mt-auto py-3">
  <div class="container text-center">
    <span class="text-muted small">
      Built with <i class="fa-solid fa-heart text-danger mx-1"></i> by
      <a href="https://github.com/vedhakoushik/placement-prep-agent" class="text-muted">vedhakoushik</a>
    </span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
