# ─────────────────────────────────────────────────────────────
#  deploy.yml — Continuous Deployment  (Day 46)
#
#  Triggers: push to main (after CI passes)
#
#  Steps:
#    1. Build Docker image
#    2. Push to GitHub Container Registry (ghcr.io)
#    3. Deploy to Railway (or swap with Render/Fly.io)
#
#  Secrets needed (set in GitHub repo → Settings → Secrets):
#    GEMINI_API_KEY        — your Gemini key
#    TAVILY_API_KEY        — your Tavily key
#    RAILWAY_TOKEN         — from railway.app dashboard
#    LANGSMITH_API_KEY     — optional
# ─────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches:
      - main          # only deploy from main branch
  workflow_dispatch:  # allow manual trigger from GitHub UI

# Prevent concurrent deploys (queue them instead)
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Job 1: Run CI checks first ───────────────────────────────
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: python -m pytest week6/day37_unit_tests.py -v --tb=short

  # ── Job 2: Build and push Docker image ───────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test          # never deploy if tests fail

    permissions:
      contents: read
      packages: write    # needed to push to ghcr.io

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided, no setup needed

      # Generate image tags: latest + short SHA
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # Build multi-platform image and push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Railway ──────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # shows deployment in GitHub UI

    steps:
      - uses: actions/checkout@v4

      # Install Railway CLI
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Deploy — Railway reads the Dockerfile automatically
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service placement-prep \
            --detach
        # --detach: don't wait for Railway to finish (async deploy)

      - name: Deployment summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Deployed commit \`${{ github.sha }}\` to Railway" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
