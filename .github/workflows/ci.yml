# ─────────────────────────────────────────────────────────────
#  ci.yml — Continuous Integration  (Day 45)
#
#  Runs on every push and every pull request.
#  Jobs: lint → unit tests → integration tests → docker build
#
#  All external API calls are mocked — no secrets needed in CI.
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (check only — no auto-fix in CI)
        run: |
          ruff check src/ week6/ main.py \
            --ignore E501,E402,F401 \
            --exit-zero          # warn but don't fail CI on style issues

  # ── Job 2: Unit tests ─────────────────────────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint          # only run if lint passes

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: python -m pytest week6/day37_unit_tests.py -v --tb=short

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: .pytest_cache/

  # ── Job 3: Integration tests ──────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests     # only run after unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run integration tests
        run: python -m pytest week6/day38_integration_tests.py -v --tb=short

  # ── Job 4: Docker build check ────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: unit-tests     # build only if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — just verify it builds)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: placement-prep:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 5: Summary ───────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, docker-build]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint         | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit tests   | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration  | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
