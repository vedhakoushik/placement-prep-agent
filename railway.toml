# railway.toml — Railway deployment configuration  (Day 47)
#
# Railway reads this file to know how to build and run the app.
# The Dockerfile handles the build; this file adds Railway-specific settings.
#
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"          # use our Dockerfile (auto-detected anyway)
dockerfilePath = "Dockerfile"   # explicit path

[deploy]
startCommand = "streamlit run week5/day34_35_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 30         # seconds to wait for health check
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
