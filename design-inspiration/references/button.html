<!-- BUTTON patterns — copy directly -->

<!-- Primary: gradient, full-width -->
<button style="
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  font-family: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 20px rgba(79,70,229,0.55)'"
   onmouseout="this.style.transform='none';this.style.boxShadow='0 4px 16px rgba(79,70,229,0.4)'">
  ✨ Research
</button>

<!-- Secondary: purple ghost -->
<button style="
  background: #1e1b4b;
  color: #a78bfa;
  border: 1px solid #3730a3;
  border-radius: 6px;
  padding: 9px 18px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
">
  🤖 Which company should I target first?
</button>

<!-- Icon button (send / action) -->
<button style="
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  border: none;
  border-radius: 6px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
  flex-shrink: 0;
  color: #fff;
">➤</button>
