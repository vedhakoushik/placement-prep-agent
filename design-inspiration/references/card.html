<!-- CARD — base pattern. Copy and extend. -->
<!-- Variants: default | active (highlighted border) | ai (purple gradient) -->

<!-- Default card -->
<div style="
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
">
  content here
</div>

<!-- Active / highlighted card (e.g. progress tracker) -->
<div style="
  background: #1a1d27;
  border: 1.5px solid #4F46E5;
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 12px;
">
  content here
</div>

<!-- AI / recommendation card (purple gradient) -->
<div style="
  background: linear-gradient(135deg, #1e1b4b, #2e1065);
  border: 1px solid #3730a3;
  border-radius: 10px;
  padding: 14px 16px;
  color: #c4b5fd;
  font-size: 12px;
  line-height: 1.6;
">
  <strong style="color: #a78bfa; display: block; margin-bottom: 4px; font-size: 13px;">🎯 AI Recommendation</strong>
  Content here
</div>

<!-- Result card with fadeInUp entrance -->
<div style="
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
  animation: fadeInUp 0.4s ease both;
">
  content here
</div>
