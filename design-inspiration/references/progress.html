<!-- PROGRESS TRACKER — live step component -->
<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.spinner {
  width:13px;height:13px;
  border:2px solid #312e81;border-top-color:#818cf8;
  border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;
}
</style>

<div style="
  background:#1a1d27;
  border:1.5px solid #4F46E5;
  border-radius:12px;
  padding:16px 18px;
  margin-bottom:12px;
">
  <!-- Header with spinner -->
  <div style="font-size:12px;font-weight:600;color:#818cf8;margin-bottom:12px;display:flex;align-items:center;gap:8px">
    <div class="spinner"></div>
    Synthesizing with AI…
  </div>

  <!-- Steps -->
  <div style="display:flex;flex-direction:column;gap:8px">

    <!-- DONE step -->
    <div style="display:flex;align-items:center;gap:9px;font-size:12px">
      <div style="width:20px;height:20px;border-radius:50%;background:#065f46;color:#4ade80;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">✓</div>
      <span style="color:#4ade80">Company basics fetched</span>
    </div>

    <!-- DONE step -->
    <div style="display:flex;align-items:center;gap:9px;font-size:12px">
      <div style="width:20px;height:20px;border-radius:50%;background:#065f46;color:#4ade80;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">✓</div>
      <span style="color:#4ade80">Interview data collected</span>
    </div>

    <!-- RUNNING step -->
    <div style="display:flex;align-items:center;gap:9px;font-size:12px">
      <div class="spinner"></div>
      <span style="color:#818cf8;animation:pulse 1.5s ease-in-out infinite">Synthesizing with AI…</span>
    </div>

    <!-- PENDING step -->
    <div style="display:flex;align-items:center;gap:9px;font-size:12px">
      <div style="width:20px;height:20px;border-radius:50%;background:#1f2937;color:#374151;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;line-height:1">·</div>
      <span style="color:#374151">Generating questions</span>
    </div>

  </div>
</div>
